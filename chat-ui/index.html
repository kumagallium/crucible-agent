      document.getElementById('messages').appendChild(guide);
    }
    function hideAuthGuide() {
      const el = document.getElementById('auth-guide');
      if (el) { el.remove(); authGuideShown = false; }
    }

    // --- WebSocket ---
    function connect() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const wsParams = new URLSearchParams({ session_id: wsSessionId });
      const key = getApiKey();
      if (key) wsParams.set('api_key', key);
      ws = new WebSocket(`${proto}//${location.host}/agent/ws?${wsParams}`);

      ws.onopen = () => {
        hideAuthGuide();
        statusEl.textContent = '接続中';
        statusEl.className = 'conn-status connected';
        sendBtn.disabled = false;
        sessionDisplay.textContent = wsSessionId.slice(0, 8);
        sessionDisplay.dataset.sessionId = wsSessionId;

        // 初回ロード時に現セッションのチャット履歴を復元
        if (initialLoad) {
          initialLoad = false;
          loadSessionMessages(wsSessionId).catch(() => {});
        }
        loadSessionList();
      };

      ws.onclose = (ev) => {
        sendBtn.disabled = true;
        // 認証エラー（API キー未設定 or 不正）
        if (ev.code === 4001) {
          statusEl.textContent = 'API Key が必要です';
          statusEl.className = 'conn-status disconnected';
          showAuthGuide();
          return; // 自動再接続しない
        }
        statusEl.textContent = '切断';
        statusEl.className = 'conn-status disconnected';
        if (!manualDisconnect) {
          setTimeout(connect, 3000);
        }
        manualDisconnect = false;
      };

      ws.onerror = () => {};
      ws.onmessage = (e) => handleEvent(JSON.parse(e.data));
    }

    function handleEvent(data) {
      switch (data.type) {
        case 'text_delta':
          if (!currentAgentMsg) {
            currentAgentMsg = addMsg('', 'agent');
            lastAgentWrapper = currentAgentMsg._wrapper;
            currentAgentMsg.classList.add('typing');
            currentAgentMsg._rawText = '';
          }
          currentAgentMsg._rawText += data.content;
          currentAgentMsg.innerHTML = renderMarkdown(currentAgentMsg._rawText);
          scrollToBottom();
          break;
        case 'entity_recorded':
          if (data.user_entity_id && lastUserWrapper) {
            lastUserWrapper.dataset.entityId = data.user_entity_id;
          }
          if (data.response_entity_id && lastAgentWrapper) {
            lastAgentWrapper.dataset.entityId = data.response_entity_id;
          }
          // リアルタイム編集時: 編集元の wrapper を探してページネーションを追加/更新
          if (data.edit_from_entity_id && data.user_entity_id && lastUserWrapper) {
            attachRevisionNav(data.edit_from_entity_id, data.user_entity_id, lastUserWrapper, lastAgentWrapper);
          }
          break;
        case 'approval_request':
          addApprovalMsg(data.tool_call_id, data.tool_name, data.input, data.content);
          break;
        case 'tool_start':
          addToolStep('start', data.tool_name, data.input);
          break;
        case 'tool_end':
          addToolStep('end', data.tool_name, data.output, data.duration_ms);
          break;
        case 'done':
          finalizeToolSteps();
          if (currentAgentMsg) {
            currentAgentMsg.classList.remove('typing');
            if (currentAgentMsg._rawText) {
              currentAgentMsg.innerHTML = renderMarkdown(currentAgentMsg._rawText);
            }
            currentAgentMsg = null;
          }
          const thinkingMsgs = messagesEl.querySelectorAll('.msg.system');
          thinkingMsgs.forEach(m => { if (m.textContent === '考え中...') m.remove(); });
          sendBtn.disabled = false;
          inputEl.disabled = false;
          inputEl.focus();
          loadSessionList();
          // タイトル生成（初回メッセージかつ未保存の場合のみ）
          if (firstUserMessage && !getSessionTitle(wsSessionId)) {
            generateTitle(wsSessionId, firstUserMessage);
            firstUserMessage = null;
          }
          break;
        case 'error':
          addSystemMsg(`エラー: ${data.content}`);
          sendBtn.disabled = false;
          inputEl.disabled = false;
          break;
      }
    }

    function send() {
      const text = inputEl.value.trim();
      if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

      // 現セッションの最初のメッセージを記録（タイトル生成用）
      if (!firstUserMessage) firstUserMessage = text;

      const userEl = addMsg(text, 'user');
      lastUserWrapper = userEl._wrapper;
      lastAgentWrapper = null;

      const payload = { type: 'message', content: text };
      if (profileEl.value) payload.profile = profileEl.value;
      if (modelSelectEl.value) payload.model = modelSelectEl.value;
      if (customInstrEl.value.trim()) payload.custom_instructions = customInstrEl.value.trim();
      const enabled = getEnabledTools();
      if (enabled.length < Object.keys(toolStates).length) {
        payload.server_names = enabled;
      }
      if (planMode) payload.require_approval = true;
      // 引用中の entity_id を payload に含める
      if (pendingContextIds.length > 0) {
        payload.context_ids = pendingContextIds.map(c => c.entityId);
        clearCitationCards();
      }
      ws.send(JSON.stringify(payload));

      inputEl.value = '';
      inputEl.style.height = 'auto';
      sendBtn.disabled = true;
      inputEl.disabled = true;
      currentAgentMsg = null;
      addSystemMsg('考え中...');
    }

    // --- DOM ヘルパー ---
    function addMsg(text, cls, targetContainer) {
      const wrapper = document.createElement('div');
      wrapper.className = `msg-wrapper msg-wrapper-${cls}`;

      const el = document.createElement('div');
      el.className = `msg ${cls}`;
      el.textContent = text;
      el._wrapper = wrapper;
      wrapper.appendChild(el);

      if (cls === 'user' || cls === 'agent') {
        const actions = document.createElement('div');
        actions.className = 'msg-actions';
        if (cls === 'user') {
          actions.innerHTML =
            `<button class="msg-action-btn" data-action="quote" data-tooltip="新規セッションに引用">${ICON.quoteNew}</button>` +
            `<button class="msg-action-btn" data-action="copy" data-tooltip="別セッションにコピー">${ICON.copy}</button>` +
            `<button class="msg-action-btn" data-action="branch" data-tooltip="編集">${ICON.pencil}</button>`;
        } else {
          actions.innerHTML =
            `<button class="msg-action-btn" data-action="quote" data-tooltip="新規セッションに引用">${ICON.quoteNew}</button>` +
            `<button class="msg-action-btn" data-action="copy" data-tooltip="別セッションにコピー">${ICON.copy}</button>`;
        }
        wrapper.appendChild(actions);

        actions.querySelectorAll('.msg-action-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            const entityId = wrapper.dataset.entityId;
            if (!entityId) return;
            const content = el._rawText || el.textContent;
            const action = btn.dataset.action;
            if (action === 'quote') quoteToNewSession(entityId, content);
            else if (action === 'copy') copyEntityRef(entityId, content);
            else if (action === 'branch') openBranchModal(entityId, content);
          });
        });
      }

      (targetContainer || messagesEl).appendChild(wrapper);
      scrollToBottom();
      return el;
    }

    function setMsgEntityId(el, entityId) {
      if (el && el._wrapper && entityId) {
        el._wrapper.dataset.entityId = entityId;
      }
    }

    let currentToolDetails = null;
    let toolStepCount = 0;

    function getOrCreateToolDetails() {
      if (!currentToolDetails) {
        const details = document.createElement('details');
        details.className = 'tool-steps';
        const summary = document.createElement('summary');
        summary.textContent = 'ツール実行中...';
        details.appendChild(summary);
        messagesEl.appendChild(details);
        currentToolDetails = details;
        toolStepCount = 0;
      }
      return currentToolDetails;
    }

    function addToolStep(type, toolName, data, durationMs) {
      const details = getOrCreateToolDetails();
      const step = document.createElement('div');
      step.className = `step ${type}`;

      if (type === 'start') {
        step.innerHTML = `🔧 <strong>${escapeHtml(toolName)}</strong><code>${escapeHtml(JSON.stringify(data, null, 2))}</code>`;
        toolStepCount++;
      } else if (type === 'end') {
        const rejected = data && data.rejected;
        step.className = `step ${rejected ? 'rejected' : 'end'}`;
        const label = rejected ? `❌ ${toolName} — 拒否` : `✅ ${toolName} (${durationMs}ms)`;
        step.innerHTML = `${escapeHtml(label)}<code>${escapeHtml(JSON.stringify(data, null, 2))}</code>`;
      }

      details.appendChild(step);
      const summary = details.querySelector('summary');
      summary.textContent = `🔧 ${toolStepCount} ツール実行`;
      scrollToBottom();
    }

    function finalizeToolSteps() {
      if (currentToolDetails) {
        const summary = currentToolDetails.querySelector('summary');
        summary.textContent = `✅ ${toolStepCount} ツール実行完了`;
        currentToolDetails = null;
        toolStepCount = 0;
      }
    }

    function addApprovalMsg(toolCallId, toolName, toolInput, message) {
      const el = document.createElement('div');
      el.className = 'msg approval';
      el.innerHTML = `
        <div class="approval-label">⚠️ ${escapeHtml(message || 'ツールを実行してよいですか？')}</div>
        <div class="approval-detail">${escapeHtml(toolName)}: ${escapeHtml(JSON.stringify(toolInput, null, 2))}</div>
        <div class="approval-actions">
          <button class="btn-approve" data-id="${escapeHtml(toolCallId)}">実行する</button>
          <button class="btn-reject" data-id="${escapeHtml(toolCallId)}">拒否</button>
        </div>`;
      messagesEl.appendChild(el);
      scrollToBottom();

      el.querySelector('.btn-approve').addEventListener('click', () => {
        sendApproval(toolCallId, true);
        el.querySelector('.approval-actions').innerHTML = '<span style="color:var(--running-fg);font-size:12px;">✅ 承認しました</span>';
      });
      el.querySelector('.btn-reject').addEventListener('click', () => {
        sendApproval(toolCallId, false);
        el.querySelector('.approval-actions').innerHTML = '<span style="color:var(--error-fg);font-size:12px;">❌ 拒否しました</span>';
      });
    }

    function sendApproval(toolCallId, approved) {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'approval', tool_call_id: toolCallId, approved }));
      }
    }

    function addSystemMsg(text) {
      const el = document.createElement('div');
      el.className = 'msg system';
      el.textContent = text;
      messagesEl.appendChild(el);
      scrollToBottom();
    }

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function escapeHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function renderMarkdown(text) {
      let html = escapeHtml(text);

      // コードブロック (```...```)
      html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');

      // テーブル
      html = html.replace(/^(\|.+\|)\n(\|[-| :]+\|)\n((?:\|.+\|\n?)*)/gm, (_, header, sep, body) => {
        const ths = header.split('|').filter(c => c.trim()).map(c => `<th>${c.trim()}</th>`).join('');
        const rows = body.trim().split('\n').map(row => {
          const tds = row.split('|').filter(c => c.trim()).map(c => `<td>${c.trim()}</td>`).join('');
          return `<tr>${tds}</tr>`;
        }).join('');
        return `<table><thead><tr>${ths}</tr></thead><tbody>${rows}</tbody></table>`;
      });

      // 見出し
      html = html.replace(/^######\s+(.+)$/gm, '<h6>$1</h6>');
      html = html.replace(/^#####\s+(.+)$/gm, '<h5>$1</h5>');
      html = html.replace(/^####\s+(.+)$/gm, '<h4>$1</h4>');
      html = html.replace(/^###\s+(.+)$/gm, '<h3>$1</h3>');
      html = html.replace(/^##\s+(.+)$/gm, '<h2>$1</h2>');
      html = html.replace(/^#\s+(.+)$/gm, '<h1>$1</h1>');

      // 水平線
      html = html.replace(/^---$/gm, '<hr>');

      // 引用
      html = html.replace(/^&gt;\s+(.+)$/gm, '<blockquote>$1</blockquote>');

      // リスト
      html = html.replace(/^(\d+)\.\s+(.+)$/gm, '<li>$2</li>');
      html = html.replace(/^[-*]\s+(.+)$/gm, '<li>$1</li>');
      html = html.replace(/(<li>.*<\/li>\n?)+/g, m => {
        return m.includes('1.') ? `<ol>${m}</ol>` : `<ul>${m}</ul>`;
      });

      // インラインコード
      html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

      // 太字・斜体
      html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

      // 段落（空行で分割）
      html = html.replace(/\n\n+/g, '</p><p>');
      html = '<p>' + html + '</p>';
      html = html.replace(/<p>\s*<\/p>/g, '');
      html = html.replace(/<p>(<h[1-6]>)/g, '$1');
      html = html.replace(/(<\/h[1-6]>)<\/p>/g, '$1');
      html = html.replace(/<p>(<pre>)/g, '$1');
      html = html.replace(/(<\/pre>)<\/p>/g, '$1');
      html = html.replace(/<p>(<table>)/g, '$1');
      html = html.replace(/(<\/table>)<\/p>/g, '$1');
      html = html.replace(/<p>(<ul>)/g, '$1');
      html = html.replace(/(<\/ul>)<\/p>/g, '$1');
      html = html.replace(/<p>(<ol>)/g, '$1');
      html = html.replace(/(<\/ol>)<\/p>/g, '$1');
      html = html.replace(/<p>(<hr>)/g, '$1');
      html = html.replace(/(<hr>)<\/p>/g, '$1');
      html = html.replace(/<p>(<blockquote>)/g, '$1');
      html = html.replace(/(<\/blockquote>)<\/p>/g, '$1');

      return html;
    }

    // --- プロファイル管理モーダル ---
    const profileModalOverlay = document.getElementById('profile-modal-overlay');
    const pmBody = document.getElementById('pm-body');
    const pmModalTitle = document.getElementById('pm-modal-title');
    const pmCloseBtn = document.getElementById('pm-close-btn');
    const profileManageBtn = document.getElementById('profile-manage-btn');

    function openProfileModal() {
      profileModalOverlay.classList.add('open');
      renderProfileList();
    }

    function closeProfileModal() {
      profileModalOverlay.classList.remove('open');
    }

    profileManageBtn.addEventListener('click', openProfileModal);
    pmCloseBtn.addEventListener('click', closeProfileModal);
    profileModalOverlay.addEventListener('click', (e) => {
      if (e.target === profileModalOverlay) closeProfileModal();
    });

    async function renderProfileList() {
      pmModalTitle.textContent = 'プロファイル管理';
      pmBody.innerHTML = '<div style="color:var(--muted-fg);font-size:13px;text-align:center;padding:24px 0;">読み込み中...</div>';
      let profiles = [];
      try {
        const data = await fetch('/profiles').then(r => r.json());
        profiles = data.profiles || [];
      } catch {
        pmBody.innerHTML = '<div style="color:var(--error-fg);font-size:13px;text-align:center;padding:24px 0;">取得に失敗しました</div>';
        return;
      }

      let html = '<div class="pm-list-header"><button class="pm-new-btn" id="pm-new-btn">＋ 新規作成</button></div>';
      if (profiles.length === 0) {
        html += '<div class="pm-empty">プロファイルがありません</div>';
      } else {
        for (const p of profiles) {
          html += `
          <div class="pm-profile-card" data-id="${escapeHtml(String(p.id))}">
            <div class="pm-card-top">
              <div class="pm-card-info">
                <div class="pm-card-name">${escapeHtml(p.name)}</div>
                ${p.description ? `<div class="pm-card-desc">${escapeHtml(p.description)}</div>` : ''}
              </div>
              <div class="pm-card-actions">
                <button class="pm-edit-btn" data-id="${escapeHtml(String(p.id))}" data-name="${escapeHtml(p.name)}">編集</button>
                <button class="pm-delete-btn" data-id="${escapeHtml(String(p.id))}" data-name="${escapeHtml(p.name)}">削除</button>
              </div>
            </div>
            <div class="pm-delete-confirm" id="pm-del-confirm-${escapeHtml(String(p.id))}">
              <p>「${escapeHtml(p.name)}」を削除しますか？この操作は元に戻せません。</p>
              <div class="pm-delete-confirm-actions">
                <button class="pm-confirm-yes-btn" data-id="${escapeHtml(String(p.id))}">削除する</button>
                <button class="pm-confirm-no-btn" data-id="${escapeHtml(String(p.id))}">キャンセル</button>
              </div>
            </div>
          </div>`;
        }
      }
      pmBody.innerHTML = html;

      document.getElementById('pm-new-btn').addEventListener('click', () => renderProfileForm(null));

      pmBody.querySelectorAll('.pm-edit-btn').forEach(btn => {
        btn.addEventListener('click', () => renderProfileForm(btn.dataset.id));
      });

      pmBody.querySelectorAll('.pm-delete-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const confirmEl = document.getElementById(`pm-del-confirm-${btn.dataset.id}`);
          if (confirmEl) confirmEl.classList.add('visible');
        });
      });

      pmBody.querySelectorAll('.pm-confirm-no-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const confirmEl = document.getElementById(`pm-del-confirm-${btn.dataset.id}`);
          if (confirmEl) confirmEl.classList.remove('visible');
        });
      });

      pmBody.querySelectorAll('.pm-confirm-yes-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          btn.disabled = true;
          btn.textContent = '削除中...';
          try {
            await fetch(`/profiles/${btn.dataset.id}`, { method: 'DELETE' });
          } catch {}
          loadProfiles();
          renderProfileList();
        });
      });
    }

    async function renderProfileForm(profileId) {
      const isNew = (profileId === null);
      pmModalTitle.textContent = isNew ? '新規プロファイル作成' : 'プロファイルを編集';

      let name = '', description = '', content = '';

      if (!isNew) {
        pmBody.innerHTML = '<div style="color:var(--muted-fg);font-size:13px;text-align:center;padding:24px 0;">読み込み中...</div>';
        try {
          const data = await fetch(`/profiles/${profileId}`).then(r => r.json());
          name = data.name || '';
          description = data.description || '';
          content = data.content || '';
        } catch {
          pmBody.innerHTML = '<div style="color:var(--error-fg);font-size:13px;text-align:center;padding:24px 0;">取得に失敗しました</div>';
          return;
        }
      }

      pmBody.innerHTML = `
        <div class="pm-form-group">
          <label for="pm-field-name">名前 <span style="color:var(--error-fg)">*</span></label>
          <input type="text" id="pm-field-name" placeholder="プロファイル名" value="${escapeHtml(name)}">
        </div>
        <div class="pm-form-group">
          <label for="pm-field-desc">説明</label>
          <input type="text" id="pm-field-desc" placeholder="このプロファイルの説明（任意）" value="${escapeHtml(description)}">
        </div>
        <div class="pm-form-group">
          <label for="pm-field-content">プロンプト本文 <span style="color:var(--error-fg)">*</span></label>
          <textarea id="pm-field-content" placeholder="システムプロンプトの内容を入力...">${escapeHtml(content)}</textarea>
        </div>
        <div class="pm-form-error" id="pm-form-error"></div>
        <div class="pm-form-actions">
          <button class="pm-cancel-btn" id="pm-form-cancel">キャンセル</button>
          <button class="pm-save-btn" id="pm-form-save">保存</button>
        </div>`;

      document.getElementById('pm-form-cancel').addEventListener('click', () => renderProfileList());

      document.getElementById('pm-form-save').addEventListener('click', async () => {
        const nameVal = document.getElementById('pm-field-name').value.trim();
        const descVal = document.getElementById('pm-field-desc').value.trim();
        const contentVal = document.getElementById('pm-field-content').value.trim();
        const errorEl = document.getElementById('pm-form-error');
        const saveBtn = document.getElementById('pm-form-save');

        if (!nameVal) {
          errorEl.textContent = '名前は必須です';
          errorEl.classList.add('visible');
          return;
        }
        if (!contentVal) {
          errorEl.textContent = 'プロンプト本文は必須です';
          errorEl.classList.add('visible');
          return;
        }
        errorEl.classList.remove('visible');

        saveBtn.disabled = true;
        saveBtn.textContent = '保存中...';

        try {
          if (isNew) {

    const revisionChains = {};

    function attachRevisionNav(originalEntityId, newEntityId, newUserWrapper, newAgentWrapper) {
      // 元のメッセージの wrapper を DOM から探す
      const origUserWrapper = messagesEl.querySelector(
        `.msg-wrapper[data-entity-id="${CSS.escape(originalEntityId)}"]`
      );

      // チェーンを初期化（元メッセージを含む）
      if (!revisionChains[originalEntityId]) {
        const origAgentWrapper = origUserWrapper ? origUserWrapper.nextElementSibling : null;
        revisionChains[originalEntityId] = [{
          entityId: originalEntityId,
          userWrapper: origUserWrapper,
          agentWrapper: (origAgentWrapper && origAgentWrapper.classList.contains('msg-wrapper-agent')) ? origAgentWrapper : null,
        }];
      }

      // 新しい版をチェーンに追加
      const chain = revisionChains[originalEntityId];
      chain.push({
        entityId: newEntityId,
        userWrapper: newUserWrapper,
        agentWrapper: newAgentWrapper,
      });

      // 既存のナビを削除（再描画）
      const existingNav = messagesEl.querySelector(`.rev-nav[data-chain="${CSS.escape(originalEntityId)}"]`);
      if (existingNav) existingNav.remove();

      // ページネーション UI を作成（アクションバー内に配置）
      let activeIdx = chain.length - 1;
      const nav = createRevNav();
      nav.dataset.chain = originalEntityId;
      const prevBtn = nav.querySelector('.rev-prev');
      const nextBtn = nav.querySelector('.rev-next');
      const label = nav.querySelector('.rev-label');

      function updateNav() {
        label.textContent = `${activeIdx + 1} / ${chain.length}`;
        prevBtn.disabled = activeIdx === 0;
        nextBtn.disabled = activeIdx === chain.length - 1;
      }

      function attachNavToActive() {
        if (nav.parentNode) nav.remove();
        const activeUserWrapper = chain[activeIdx].userWrapper;
        if (activeUserWrapper) {
          const userActions = activeUserWrapper.querySelector('.msg-actions');
          if (userActions) userActions.appendChild(nav);
        }
      }

      function showVersion(idx) {
        if (nav.parentNode) nav.remove();
        chain.forEach((v, i) => {
          if (v.userWrapper) v.userWrapper.style.display = i === idx ? '' : 'none';
          if (v.agentWrapper) v.agentWrapper.style.display = i === idx ? '' : 'none';
        });
        activeIdx = idx;
        updateNav();
        attachNavToActive();
      }

      prevBtn.addEventListener('click', (e) => { e.stopPropagation(); if (activeIdx > 0) showVersion(activeIdx - 1); });
      nextBtn.addEventListener('click', (e) => { e.stopPropagation(); if (activeIdx < chain.length - 1) showVersion(activeIdx + 1); });
      updateNav();
      attachNavToActive();
    }

    function provColor(node) {

    // Cytoscape.js を初回グラフ表示時に動的ロード
    let cytoscapeLoaded = (typeof cytoscape !== 'undefined');
    async function loadCytoscape() {
      if (cytoscapeLoaded) return;
      await new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = 'https://unpkg.com/cytoscape@3.30.4/dist/cytoscape.min.js';
        s.onload = resolve;
        s.onerror = () => reject(new Error('Cytoscape.js の読み込みに失敗しました'));
        document.head.appendChild(s);
      });
      cytoscapeLoaded = true;
    }

    async function showGraph() {
      if (!wsSessionId) return;
      graphPanel.classList.add('open');
      chatContent.classList.add('hidden');

      try {
        await loadCytoscape();
        const resp = await fetch(`/provenance/${wsSessionId}/graph`);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();

        // --- Entity のみの簡易グラフを構築 ---
        // Activity を介して user_message → agent_response を直結
        // 連続ターンの response → 次の user_message も接続

        const nodeMap = {};  // id → node
        for (const n of data.nodes) nodeMap[n.id] = n;

        // Activity ごとに入力 Entity と出力 Entity を特定
        // used(activity, entity) → 入力, wasGeneratedBy(entity, activity) → 出力
        const activityInput = {};   // activity_id → entity_id (user_message)
        const activityOutput = {};  // activity_id → entity_id (agent_response)

        for (const e of data.edges) {
          if (e.relation === 'used' && (!e.role || e.role === 'input')) {
            const target = nodeMap[e.target];
            if (target && target.node_type === 'entity') activityInput[e.source] = e.target;
          }
          if (e.relation === 'wasGeneratedBy') {
            const source = nodeMap[e.source];
            if (source && source.node_type === 'entity') activityOutput[e.target] = e.source;
          }
        }

        // このセッションの Entity のみ抽出（クロスセッション stub を除外）
        const entities = data.nodes
          .filter(n => n.node_type === 'entity' && n.session_id === wsSessionId)
          .sort((a, b) => (a.created_at || '').localeCompare(b.created_at || ''));

        const elements = [];

        // Entity ノードを追加
        for (const n of entities) {
          const isUser = n.prov_type === 'user_message';
          const isResponse = n.prov_type === 'agent_response';
          const isTool = n.prov_type === 'tool_result';
          elements.push({
            data: {
              id: n.id,
              label: n.label || n.prov_type,
              bgColor: isUser ? '#4B7A52' : isResponse ? '#ffffff' : '#dbeafe',
              fgColor: isUser ? '#ffffff' : '#1a2e1d',
              borderColor: isUser ? '#3d6844' : isResponse ? '#d5e0d7' : '#93c5fd',
              nodeType: n.prov_type,
            },
          });
        }

        // === リレーションベースでエッジ構築（時系列に依存しない） ===

        // Activity を時系列順にソート
        const activities = data.nodes
          .filter(n => n.node_type === 'activity')
          .sort((a, b) => (a.created_at || '').localeCompare(b.created_at || ''));

        // ターン内エッジ: user_message → agent_response（Activity の input → output）
        for (const a of activities) {
          const inputId = activityInput[a.id];
          const outputId = activityOutput[a.id];
          if (inputId && outputId) {
            elements.push({
              data: { id: `turn-${a.id}`, source: inputId, target: outputId, label: '' },
            });
          }
        }

        // ターン間エッジ: Activity チェーンから構築
        // used(activity, entity, role="context") を辿って response → 次の input を接続
        const contextUsed = {};  // activity_id → context_entity_id
        for (const e of data.edges) {
          if (e.relation === 'used' && e.role === 'context') {
            contextUsed[e.source] = e.target;
          }
        }

        for (const a of activities) {
          const contextEntityId = contextUsed[a.id];
          const inputId = activityInput[a.id];
          if (contextEntityId && inputId) {
            // prev_response → current_user_message
            elements.push({
              data: {
                id: `ctx-${a.id}`,
                source: contextEntityId,
                target: inputId,
              },
            });
          }
        }

        // wasInfluencedBy エッジ（このセッションが参照した外部 Entity のみ）
        // 他セッションから参照「された」エッジは表示しない
        const sessionEntityIds = new Set(entities.map(en => en.id));
        for (const e of data.edges) {
          if (e.relation === 'wasInfluencedBy' || e.relation === 'wasDerivedFrom') {
            const derivedId = e.source;  // 影響を受けた Entity（PROV: derived）
            const sourceId = e.target;   // 引用元 Entity（PROV: source）

            // このセッションの Entity が参照した場合のみ表示
            if (!sessionEntityIds.has(derivedId)) continue;

            const src = nodeMap[derivedId];
            const tgt = nodeMap[sourceId];
            if (src && src.node_type === 'entity' && tgt && tgt.node_type === 'entity') {
              // クロスセッション Entity ノードが未追加なら追加（オレンジ枠で区別）
              if (!sessionEntityIds.has(sourceId)) {
                const isUser = tgt.prov_type === 'user_message';
                elements.push({
                  data: {
                    id: tgt.id,
                    label: tgt.label || tgt.prov_type,
                    bgColor: isUser ? '#4B7A52' : '#ffffff',
                    fgColor: isUser ? '#ffffff' : '#1a2e1d',
                    borderColor: '#f59e0b',
                    nodeType: tgt.prov_type,
                  },
                });
              }
              // 表示: 引用元 → 影響を受けた response（順方向）
              elements.push({
                data: {
                  id: `inf-${derivedId}-${sourceId}`,
                  source: sourceId,
                  target: derivedId,
                },
              });
            }
          }
        }

        // === 列（ブランチ）レベル計算 ===
        // 分岐（wasRevisionOf）もクロスセッション参照も新しい列に配置

        // 1. 分岐による列分け
        const revisionNewIds = new Set();
        for (const e of data.edges) {
          if (e.relation === 'wasRevisionOf') revisionNewIds.add(e.source);
        }
        const entityBranch = {};
        let currentBranch = 0;
        for (const e of entities) {
          if (revisionNewIds.has(e.id)) currentBranch++;
          entityBranch[e.id] = currentBranch;
        }

        // 2. クロスセッション Entity の列・Y位置計算
        // 影響を受けた Entity の Y 位置の少し上に、右列に配置
        const crossSessionPos = {};  // entity_id → { x, y }
        let crossCol = currentBranch + 1;
        const crossColMap = {};  // source_entity_id → column

        for (const e of data.edges) {
          if (e.relation === 'wasInfluencedBy' || e.relation === 'wasDerivedFrom') {
            const sourceId = e.target;   // 引用元（クロスセッション）
            const derivedId = e.source;  // 影響を受けた Entity（このセッション）

            // このセッションの Entity が参照した場合のみ処理
            if (!sessionEntityIds.has(derivedId)) continue;
            // 引用元がこのセッション内ならクロスセッション位置計算不要
            if (sessionEntityIds.has(sourceId)) continue;
            if (!crossSessionPos[sourceId]) {
              // 引用元にまだ列が割り当てられていなければ新規列
              if (!crossColMap[sourceId]) {
                crossColMap[sourceId] = crossCol++;
              }

              // 影響を受けた Entity の Y 位置を基準に配置
              const derivedIdx = entities.findIndex(en => en.id === derivedId);
              const y = derivedIdx >= 0 ? (derivedIdx - 1) * 100 : 0;
              crossSessionPos[sourceId] = {
                x: crossColMap[sourceId] * 400,
                y: Math.max(0, y),
              };
            }
          }
        }

        if (cyInstance) cyInstance.destroy();

        cyInstance = cytoscape({
          container: graphContainer,
          elements,
          style: [
            {
              selector: 'node',
              style: {
                'label': 'data(label)',
                'background-color': 'data(bgColor)',
                'color': 'data(fgColor)',
                'text-valign': 'center',
                'text-halign': 'center',
                'font-size': '11px',
                'font-family': 'Inter, sans-serif',
                'text-wrap': 'wrap',
                'text-max-width': '160px',
                'width': 'label',
                'height': 'label',
                'padding': '12px',
                'shape': 'round-rectangle',
                'border-width': 1.5,
                'border-color': 'data(borderColor)',
                'text-outline-width': 0,
              },
            },
            {
              selector: 'edge',
              style: {
                'curve-style': 'straight',
                'target-arrow-shape': 'triangle',
                'target-arrow-color': '#b8d4bb',
                'line-color': '#b8d4bb',
                'width': 1.5,
                'arrow-scale': 0.8,
              },
            },
          ],
          layout: {
            name: 'preset',
            positions: (node) => {
              const nodeId = node.id();

              // クロスセッション Entity
              if (crossSessionPos[nodeId]) return crossSessionPos[nodeId];

              const idx = entities.findIndex(e => e.id === nodeId);
              if (idx < 0) return { x: 0, y: 0 };
              const branch = entityBranch[entities[idx].id] || 0;
              const x = branch * 400;
              const y = idx * 100;
              return { x, y };
            },
          },
          userZoomingEnabled: true,
          userPanningEnabled: true,
          boxSelectionEnabled: false,
        });

        cyInstance.fit(undefined, 40);
      } catch (err) {
        graphContainer.innerHTML = `<div style="padding:20px;color:var(--muted-foreground)">グラフの読み込みに失敗しました: ${err.message}</div>`;
      }
    }

      { id: 'gemini', name: 'Google Gemini', models: ['gemini-2.5-pro-preview-06-05', 'gemini-2.5-flash-preview-05-20'] },
      { id: 'groq', name: 'Groq', models: ['llama-3.3-70b-versatile', 'mixtral-8x7b-32768'] },
      { id: 'ollama', name: 'Ollama (local)', models: ['llama3.2', 'mistral', 'codellama'] },
    ];

    async function renderModelList() {
      mmModalTitle.textContent = 'モデル管理';
      mmBody.innerHTML = '<div style="color:var(--muted-fg);font-size:13px;text-align:center;padding:24px 0;">読み込み中...</div>';
      let models = [];
      try {
        const data = await fetch('/models').then(r => r.json());
        models = data.models || [];
      } catch {
        mmBody.innerHTML = '<div style="color:var(--error-fg);font-size:13px;text-align:center;padding:24px 0;">取得に失敗しました</div>';
        return;
      }

      let html = '<div class="pm-list-header"><button class="pm-new-btn" id="mm-new-btn">＋ モデル追加</button></div>';
      if (models.length === 0) {
        html += '<div class="pm-empty">モデルがありません</div>';
      } else {
        for (const m of models) {
          const isDbModel = m.db_model === true;
          html += `
            <div class="pm-profile-card">
              <div class="pm-card-top">
                <div class="pm-card-info">
                  <div class="pm-card-name">${m.name}</div>
                  <div class="pm-card-desc">${m.provider} / ${m.model_id}</div>
                </div>
                <div class="pm-card-actions">
                  ${isDbModel
                    ? `<button class="pm-card-edit-btn mm-edit-btn" data-model='${JSON.stringify(m).replace(/'/g, "&#39;")}' title="編集" style="background:none;border:none;cursor:pointer;font-size:14px;color:var(--muted-fg);padding:2px 6px;">&#x270E;</button><button class="pm-card-delete-btn mm-delete-btn" data-id="${m.id}" title="削除">&#x2715;</button>`
                    : '<span style="font-size:11px;color:var(--muted-fg)">config</span>'}
                </div>
              </div>
            </div>`;
        }
      }
      mmBody.innerHTML = html;

      document.getElementById('mm-new-btn').addEventListener('click', () => renderModelForm());
      mmBody.querySelectorAll('.mm-edit-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const model = JSON.parse(btn.dataset.model);
          renderModelEditForm(model);
        });
      });
      mmBody.querySelectorAll('.mm-delete-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (!confirm('このモデルを削除しますか？')) return;
          try {
            const resp = await fetch('/models', {
              method: 'DELETE',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ id: btn.dataset.id }),
            });
            if (!resp.ok) throw new Error('Delete failed');
            loadModels();
            renderModelList();
          } catch {
            alert('削除に失敗しました');
          }
        });
      });
    }

    function renderModelForm() {
      mmModalTitle.textContent = 'モデル追加';
      let providerOptions = MODEL_PROVIDERS.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
      mmBody.innerHTML = `
        <form id="mm-form" style="display:flex;flex-direction:column;gap:10px;">
          <label style="font-size:13px;font-weight:500;color:var(--foreground)">プロバイダー</label>
          <select id="mm-provider" style="padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-lg);background:var(--background);color:var(--foreground);font-size:13px;">
            ${providerOptions}
          </select>
          <label style="font-size:13px;font-weight:500;color:var(--foreground)">API キー</label>
          <input id="mm-api-key" type="password" placeholder="sk-..." style="padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-lg);background:var(--background);color:var(--foreground);font-size:13px;">
          <label style="font-size:13px;font-weight:500;color:var(--foreground)">API Base URL（オプション）</label>
          <input id="mm-api-base" type="text" placeholder="https://..." style="padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-lg);background:var(--background);color:var(--foreground);font-size:13px;">
          <div style="display:flex;gap:8px;align-items:center;">
            <label style="font-size:13px;font-weight:500;color:var(--foreground);flex:1">モデル</label>
            <button type="button" id="mm-fetch-models" style="font-size:11px;padding:4px 10px;border:1px solid var(--border);border-radius:var(--radius-lg);background:var(--muted);color:var(--foreground);cursor:pointer;">一覧を取得</button>
          </div>
          <select id="mm-model-id" style="padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-lg);background:var(--background);color:var(--foreground);font-size:13px;">
          </select>
          <input id="mm-model-id-custom" type="text" placeholder="または手動入力..." style="padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-lg);background:var(--background);color:var(--foreground);font-size:13px;">
          <label style="font-size:13px;font-weight:500;color:var(--foreground)">表示名</label>
          <input id="mm-name" type="text" placeholder="例: gpt-4o" style="padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-lg);background:var(--background);color:var(--foreground);font-size:13px;">
          <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px;">
            <button type="button" id="mm-form-cancel" class="pm-new-btn" style="background:var(--muted);color:var(--foreground);">キャンセル</button>
            <button type="submit" class="pm-new-btn">追加</button>
          </div>
        </form>
      `;

      const providerSelect = document.getElementById('mm-provider');
      const modelSelect = document.getElementById('mm-model-id');
      const customInput = document.getElementById('mm-model-id-custom');
      const nameInput = document.getElementById('mm-name');
      const fetchBtn = document.getElementById('mm-fetch-models');

      function updateModelOptions() {
        const provider = MODEL_PROVIDERS.find(p => p.id === providerSelect.value);
        modelSelect.innerHTML = (provider ? provider.models : []).map(m => `<option value="${m}">${m}</option>`).join('');
        if (modelSelect.options.length > 0) {
          nameInput.value = modelSelect.value;
          customInput.value = '';
        }
      }

      // API から利用可能なモデル一覧を取得
      fetchBtn.addEventListener('click', async () => {
        const apiKey = document.getElementById('mm-api-key').value.trim();
        const apiBase = document.getElementById('mm-api-base').value.trim();
        if (!apiKey || !apiBase) {
          alert('API キーと API Base URL を先に入力してください');
          return;
        }
        fetchBtn.textContent = '取得中...';
        fetchBtn.disabled = true;
        try {
          const resp = await fetch('/models/available', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ api_base: apiBase, api_key: apiKey }),
          });
          if (!resp.ok) throw new Error(await resp.text());
          const data = await resp.json();
          modelSelect.innerHTML = data.models.map(m => `<option value="${m}">${m}</option>`).join('');
          if (modelSelect.options.length > 0) {
            nameInput.value = modelSelect.value;
            customInput.value = '';
          }
        } catch (err) {
          alert('モデル一覧の取得に失敗しました: ' + err.message);
        } finally {
          fetchBtn.textContent = '一覧を取得';
          fetchBtn.disabled = false;
        }
      });

      providerSelect.addEventListener('change', updateModelOptions);
      modelSelect.addEventListener('change', () => {
        nameInput.value = modelSelect.value;
        customInput.value = '';
      });
      customInput.addEventListener('input', () => {
        if (customInput.value.trim()) {
          nameInput.value = customInput.value.trim();
          modelSelect.value = '';
        }
      });
      updateModelOptions();

      document.getElementById('mm-form-cancel').addEventListener('click', () => renderModelList());
      document.getElementById('mm-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const modelId = customInput.value.trim() || modelSelect.value;
        const modelName = nameInput.value.trim() || modelId;
        const apiKey = document.getElementById('mm-api-key').value.trim();
        const apiBase = document.getElementById('mm-api-base').value.trim();

        if (!modelId || !apiKey) {
          alert('モデルと API キーは必須です');
          return;
        }

        try {
          const body = {
            model_name: modelName,
            provider: providerSelect.value,
            model_id: modelId,
            api_key: apiKey,
          };
          if (apiBase) body.api_base = apiBase;

          const resp = await fetch('/models', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
          });
          if (!resp.ok) {
            const err = await resp.text();
            throw new Error(err);
          }
          loadModels();
          renderModelList();
        } catch (err) {
          alert('追加に失敗しました: ' + err.message);
        }
      });
    }

    function renderModelEditForm(model) {
      mmModalTitle.textContent = 'モデル編集';
      let providerOptions = MODEL_PROVIDERS.map(p =>
        `<option value="${p.id}" ${p.id === model.provider ? 'selected' : ''}>${p.name}</option>`
      ).join('');
      // 既知のプロバイダーに含まれない場合は追加
      if (!MODEL_PROVIDERS.some(p => p.id === model.provider)) {
        providerOptions += `<option value="${model.provider}" selected>${model.provider}</option>`;
      }

      // model_id からプレフィックスを除去して元の ID を復元
      const rawModelId = model.model_id.includes('/') ? model.model_id.split('/').slice(1).join('/') : model.model_id;

      mmBody.innerHTML = `
        <form id="mm-edit-form" style="display:flex;flex-direction:column;gap:10px;">
          <label style="font-size:13px;font-weight:500;color:var(--foreground)">プロバイダー</label>
          <select id="mm-edit-provider" style="padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-lg);background:var(--background);color:var(--foreground);font-size:13px;">
            ${providerOptions}
          </select>
          <label style="font-size:13px;font-weight:500;color:var(--foreground)">モデル</label>
          <select id="mm-edit-model-id" style="padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-lg);background:var(--background);color:var(--foreground);font-size:13px;">
          </select>
          <input id="mm-edit-model-id-custom" type="text" placeholder="または手動入力..." value="${rawModelId}" style="padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-lg);background:var(--background);color:var(--foreground);font-size:13px;">
          <label style="font-size:13px;font-weight:500;color:var(--foreground)">表示名</label>
          <input id="mm-edit-name" type="text" value="${model.name}" style="padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-lg);background:var(--background);color:var(--foreground);font-size:13px;">
          <label style="font-size:13px;font-weight:500;color:var(--foreground)">API キー（変更する場合のみ入力）</label>
          <input id="mm-edit-api-key" type="password" placeholder="変更しない場合は空欄" style="padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-lg);background:var(--background);color:var(--foreground);font-size:13px;">
          <label style="font-size:13px;font-weight:500;color:var(--foreground)">API Base URL（オプション）</label>
          <input id="mm-edit-api-base" type="text" placeholder="https://..." style="padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-lg);background:var(--background);color:var(--foreground);font-size:13px;">
          <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px;">
            <button type="button" id="mm-edit-cancel" class="pm-new-btn" style="background:var(--muted);color:var(--foreground);">キャンセル</button>
            <button type="submit" class="pm-new-btn">更新</button>
          </div>
        </form>
      `;

      const providerSelect = document.getElementById('mm-edit-provider');
      const modelSelect = document.getElementById('mm-edit-model-id');
      const customInput = document.getElementById('mm-edit-model-id-custom');
      const nameInput = document.getElementById('mm-edit-name');

      function updateModelOptions() {
        const provider = MODEL_PROVIDERS.find(p => p.id === providerSelect.value);
        modelSelect.innerHTML = (provider ? provider.models : []).map(m => `<option value="${m}">${m}</option>`).join('');
        // カスタム入力がある場合はセレクトをクリア
        if (customInput.value.trim()) {
          modelSelect.value = '';
        }
      }

      providerSelect.addEventListener('change', updateModelOptions);
      modelSelect.addEventListener('change', () => {
        if (modelSelect.value) {
          nameInput.value = modelSelect.value;
          customInput.value = '';
        }
      });
      customInput.addEventListener('input', () => {
        if (customInput.value.trim()) {
          nameInput.value = customInput.value.trim();
          modelSelect.value = '';
        }
      });
      updateModelOptions();

      document.getElementById('mm-edit-cancel').addEventListener('click', () => renderModelList());
      document.getElementById('mm-edit-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const modelId = customInput.value.trim() || modelSelect.value;
        const modelName = nameInput.value.trim() || modelId;
        const apiKey = document.getElementById('mm-edit-api-key').value.trim();
        const apiBase = document.getElementById('mm-edit-api-base').value.trim();

        if (!modelId) {
          alert('モデルは必須です');
          return;
        }

        try {
          const body = {
            model_name: modelName,
            provider: providerSelect.value,
            model_id: modelId,
            litellm_id: model.id,
          };
          if (apiKey) body.api_key = apiKey;
          if (apiBase) body.api_base = apiBase;

          const resp = await fetch('/models', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
          });
          if (!resp.ok) {
            const err = await resp.text();
            throw new Error(err);
          }
          loadModels();
          renderModelList();
        } catch (err) {
          alert('更新に失敗しました: ' + err.message);
        }
      });
    }

    // --- API キー設定 UI ---
    const apiKeyInput = document.getElementById('api-key-input');
    const apiKeySaveBtn = document.getElementById('api-key-save');
    const apiKeyStatus = document.getElementById('api-key-status');
    apiKeyInput.value = getApiKey();
    apiKeySaveBtn.addEventListener('click', () => {
      setApiKey(apiKeyInput.value.trim());
      apiKeyStatus.textContent = '保存しました。再接続中...';
      if (ws) { ws.close(); }
      connect();
      loadHealth();
      loadModels();
      loadProfiles();
      loadTools();
      loadSessionList();
      setTimeout(() => { apiKeyStatus.textContent = ''; }, 2000);
    });

    // --- 初期化 ---
    loadHealth();
    loadModels();
    loadProfiles();
    loadTools();
    connect();
    setInterval(loadHealth, 30000);
    setInterval(loadSessionList, 30000);

    // Service Worker 登録（PWA「ホームに追加」用）
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
