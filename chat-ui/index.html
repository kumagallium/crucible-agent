<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crucible Agent</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --surface2: #0f3460;
      --accent: #e94560;
      --accent2: #533483;
      --text: #eee;
      --text-muted: #999;
      --user-bg: #0f3460;
      --agent-bg: #1a1a2e;
      --tool-bg: #2a1a3e;
      --border: #333;
      --sidebar-w: 280px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
    }

    /* --- サイドバー --- */
    #sidebar {
      width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      flex-shrink: 0;
    }
    #sidebar h2 {
      padding: 16px;
      font-size: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .sidebar-section {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-section h3 {
      font-size: 11px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }
    .sidebar-section select, .sidebar-section input {
      width: 100%;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 6px 8px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 6px;
    }
    .sidebar-section select:focus, .sidebar-section input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .sidebar-section textarea {
      width: 100%;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 6px 8px;
      border-radius: 6px;
      font-size: 12px;
      font-family: inherit;
      resize: vertical;
      min-height: 60px;
    }
    .sidebar-section textarea:focus { outline: none; border-color: var(--accent); }
    .sidebar-section label {
      font-size: 12px;
      color: var(--text-muted);
      display: block;
      margin-bottom: 4px;
    }

    /* ステータスバッジ */
    .badge {
      display: inline-block;
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 8px;
      margin-left: 4px;
    }
    .badge.ok { background: #1b4332; color: #95d5b2; }
    .badge.err { background: #3d0000; color: #ff6b6b; }
    .badge.warn { background: #3d3000; color: #ffd166; }

    /* ツールリスト */
    .tool-item {
      padding: 6px 8px;
      background: var(--bg);
      border-radius: 6px;
      margin-bottom: 4px;
      font-size: 12px;
    }
    .tool-item .name { font-weight: 600; }
    .tool-item .desc { color: var(--text-muted); font-size: 11px; margin-top: 2px; }
    .tool-item .transport {
      font-size: 10px;
      color: var(--accent);
      float: right;
    }

    /* --- メインエリア --- */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    header {
      padding: 10px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
    }
    header .status {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
    }
    header .status.connected { background: #1b4332; color: #95d5b2; }
    header .status.disconnected { background: #3d0000; color: #ff6b6b; }
    header .spacer { flex: 1; }
    header .health-item { color: var(--text-muted); font-size: 11px; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .msg {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 12px;
      line-height: 1.6;
      font-size: 14px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user { align-self: flex-end; background: var(--user-bg); border-bottom-right-radius: 4px; }
    .msg.agent { align-self: flex-start; background: var(--agent-bg); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .msg.tool { align-self: flex-start; background: var(--tool-bg); border: 1px solid #4a2060; border-radius: 8px; font-size: 12px; max-width: 60%; }
    .msg.tool .label { font-size: 11px; color: #b088cc; margin-bottom: 4px; }
    .msg.tool code { font-size: 11px; color: var(--text-muted); }
    .msg.system { align-self: center; color: var(--text-muted); font-size: 12px; font-style: italic; }
    .typing { opacity: 0.7; }
    .typing::after { content: '▊'; animation: blink 0.7s infinite; }
    @keyframes blink { 50% { opacity: 0; } }

    #input-area {
      padding: 12px 16px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }
    #input-area textarea {
      flex: 1;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      min-height: 44px;
      max-height: 120px;
    }
    #input-area textarea:focus { outline: none; border-color: var(--accent); }
    #input-area button {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 0 20px;
      font-size: 14px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    #input-area button:hover { opacity: 0.85; }
    #input-area button:disabled { opacity: 0.4; cursor: not-allowed; }

    /* レスポンシブ */
    @media (max-width: 768px) {
      #sidebar { display: none; }
    }
  </style>
</head>
<body>
  <!-- サイドバー -->
  <div id="sidebar">
    <h2>⚗️ Crucible Agent</h2>

    <!-- ヘルスステータス -->
    <div class="sidebar-section" id="health-section">
      <h3>Status</h3>
      <div id="health-list" style="font-size:12px;">読み込み中...</div>
    </div>

    <!-- プロファイル設定 -->
    <div class="sidebar-section">
      <h3>Profile</h3>
      <select id="profile">
        <option value="">デフォルト</option>
      </select>
      <label>カスタム指示</label>
      <textarea id="custom-instructions" placeholder="追加の指示（任意）..."></textarea>
    </div>

    <!-- ツール一覧 -->
    <div class="sidebar-section">
      <h3>Tools</h3>
      <div id="tool-list" style="font-size:12px;">読み込み中...</div>
    </div>
  </div>

  <!-- メイン -->
  <div id="main">
    <header>
      <span id="status" class="status disconnected">切断</span>
      <span class="spacer"></span>
      <span id="header-info" class="health-item"></span>
    </header>

    <div id="messages"></div>

    <div id="input-area">
      <textarea id="input" placeholder="メッセージを入力... (Enter で送信)" rows="1"></textarea>
      <button id="send" disabled>送信</button>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const statusEl = document.getElementById('status');
    const profileEl = document.getElementById('profile');
    const customInstrEl = document.getElementById('custom-instructions');
    const healthListEl = document.getElementById('health-list');
    const toolListEl = document.getElementById('tool-list');
    const headerInfoEl = document.getElementById('header-info');

    let ws = null;
    let currentAgentMsg = null;

    // --- データ取得 ---

    function loadHealth() {
      fetch('/health')
        .then(r => r.json())
        .then(data => {
          let html = '';
          for (const [k, v] of Object.entries(data.components || {})) {
            const cls = v === 'ok' ? 'ok' : v === 'degraded' ? 'warn' : 'err';
            html += `<div>${k} <span class="badge ${cls}">${v}</span></div>`;
          }
          html += `<div style="margin-top:6px;color:var(--text-muted)">v${data.version}</div>`;
          healthListEl.innerHTML = html;
          headerInfoEl.textContent = `status: ${data.status}`;
        })
        .catch(() => { healthListEl.textContent = '取得失敗'; });
    }

    function loadProfiles() {
      fetch('/profiles')
        .then(r => r.json())
        .then(data => {
          (data.profiles || []).forEach(p => {
            const opt = document.createElement('option');
            opt.value = p.name;
            opt.textContent = p.name;
            profileEl.appendChild(opt);
          });
        })
        .catch(() => {});
    }

    function loadTools() {
      fetch('/tools')
        .then(r => r.json())
        .then(data => {
          if (!data.tools || data.tools.length === 0) {
            toolListEl.innerHTML = '<div style="color:var(--text-muted)">ツールなし</div>';
            return;
          }
          let html = '';
          for (const t of data.tools) {
            html += `<div class="tool-item">
              <span class="transport">${t.transport}</span>
              <div class="name">${t.display_name || t.name}</div>
              ${t.description ? `<div class="desc">${t.description}</div>` : ''}
            </div>`;
          }
          // ソース情報
          for (const [k, s] of Object.entries(data.sources || {})) {
            html += `<div style="margin-top:8px;color:var(--text-muted);font-size:11px;">
              ${k}: ${s.server_count} servers (${s.status})
            </div>`;
          }
          toolListEl.innerHTML = html;
        })
        .catch(() => { toolListEl.textContent = '取得失敗'; });
    }

    // --- WebSocket ---

    function connect() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${proto}//${location.host}/agent/ws`);

      ws.onopen = () => {
        statusEl.textContent = '接続中';
        statusEl.className = 'status connected';
        sendBtn.disabled = false;
        addSystemMsg('エージェントに接続しました');
      };

      ws.onclose = () => {
        statusEl.textContent = '切断';
        statusEl.className = 'status disconnected';
        sendBtn.disabled = true;
        setTimeout(connect, 3000);
      };

      ws.onerror = () => {};
      ws.onmessage = (e) => handleEvent(JSON.parse(e.data));
    }

    function handleEvent(data) {
      switch (data.type) {
        case 'text_delta':
          if (!currentAgentMsg) {
            currentAgentMsg = addMsg('', 'agent');
            currentAgentMsg.classList.add('typing');
          }
          currentAgentMsg.textContent += data.content;
          scrollToBottom();
          break;
        case 'tool_start':
          addToolMsg(`🔧 ${data.tool_name}`, JSON.stringify(data.input, null, 2));
          break;
        case 'tool_end':
          addToolMsg(`✅ ${data.tool_name} (${data.duration_ms}ms)`, JSON.stringify(data.output, null, 2));
          break;
        case 'done':
          if (currentAgentMsg) {
            currentAgentMsg.classList.remove('typing');
            currentAgentMsg = null;
          }
          sendBtn.disabled = false;
          inputEl.disabled = false;
          inputEl.focus();
          break;
        case 'error':
          addSystemMsg(`エラー: ${data.content}`);
          sendBtn.disabled = false;
          inputEl.disabled = false;
          break;
      }
    }

    function send() {
      const text = inputEl.value.trim();
      if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

      addMsg(text, 'user');
      const payload = { type: 'message', content: text };
      if (profileEl.value) payload.profile = profileEl.value;
      if (customInstrEl.value.trim()) payload.custom_instructions = customInstrEl.value.trim();
      ws.send(JSON.stringify(payload));

      inputEl.value = '';
      inputEl.style.height = 'auto';
      sendBtn.disabled = true;
      inputEl.disabled = true;
      currentAgentMsg = null;
    }

    // --- DOM ヘルパー ---

    function addMsg(text, cls) {
      const el = document.createElement('div');
      el.className = `msg ${cls}`;
      el.textContent = text;
      messagesEl.appendChild(el);
      scrollToBottom();
      return el;
    }

    function addToolMsg(label, detail) {
      const el = document.createElement('div');
      el.className = 'msg tool';
      el.innerHTML = `<div class="label">${escapeHtml(label)}</div><code>${escapeHtml(detail)}</code>`;
      messagesEl.appendChild(el);
      scrollToBottom();
    }

    function addSystemMsg(text) {
      const el = document.createElement('div');
      el.className = 'msg system';
      el.textContent = text;
      messagesEl.appendChild(el);
      scrollToBottom();
    }

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function escapeHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    // --- イベント ---

    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
    });

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

    sendBtn.addEventListener('click', send);

    // --- 初期化 ---
    loadHealth();
    loadProfiles();
    loadTools();
    connect();

    // 定期的にヘルスを更新
    setInterval(loadHealth, 30000);
  </script>
</body>
</html>
