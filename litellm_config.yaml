# LiteLLM Proxy Configuration
# Docs: https://docs.litellm.ai/docs/proxy/configs

model_list:
  # さくらのAI Engine
  - model_name: sakura
    litellm_params:
      model: openai/gpt-oss-120b
      api_base: os.environ/SAKURA_AI_API_BASE
      api_key: os.environ/SAKURA_AI_API_KEY
      supports_function_calling: true

  # Ollama（ローカル開発用、オプション）
  # - model_name: ollama-local
  #   litellm_params:
  #     model: ollama/llama3.2
  #     api_base: http://host.docker.internal:11434

general_settings:
  master_key: sk-crucible-agent-dev
  store_model_in_db: false

litellm_settings:
  drop_params: true  # 未対応パラメータを自動除外
  modify_params: true  # メッセージ形式を自動変換
  # set_verbose: true  # デバッグ時に有効化
